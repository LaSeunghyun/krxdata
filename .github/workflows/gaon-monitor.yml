name: 가온전선 수급 모니터

on:
  schedule:
    # 5분 간격. KST 08:00~20:00 = UTC 23:00~11:00 (스크립트가 KST 시간/중단 플래그 재확인)
    - cron: '*/5 23 * * 0-4'      # KST 08:00~08:55 (일~목 UTC23)
    - cron: '*/5 0-10 * * 1-5'    # KST 09:00~19:55 (월~금 UTC0~10)
  workflow_dispatch:

concurrency:
  group: gaon-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install 2>/dev/null || true
      - name: Run 수급 monitor
        env:
          TOSS_CLIENT_ID: ${{ secrets.TOSS_CLIENT_ID }}
          TOSS_CLIENT_SECRET: ${{ secrets.TOSS_CLIENT_SECRET }}
          SUPABASE_MANAGEMENT_KEY: ${{ secrets.SUPABASE_MANAGEMENT_KEY }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node gaon-monitor.mjs
